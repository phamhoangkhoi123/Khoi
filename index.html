<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHK Premium Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(124, 92, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, border-color 0.3s ease;
        }

        .cursor-hover {
            transform: translate(-50%, -50%) scale(1.5);
            border-color: #7c5cff;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Hiệu ứng chuyển động tự nhiên cho khung chính */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .main-wrapper {
            animation: floating 5s ease-in-out infinite;
        }

        /* Hiệu ứng kính mờ (Glassmorphism) */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        /* Hiệu ứng gradient cho chữ */
        .title {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2fe, #7c5cff, #ff296a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .grid-item {
            width: 80px;
            height: 80px;
            background-color: rgba(17, 17, 17, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.4s, box-shadow 0.4s, color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grid-item:hover {
            transform: translateY(-8px) scale(1.1);
        }

        .grid-item.tiktok:hover { color: #00f2fe; box-shadow: 0 0 20px #00f2fe; border-color: #00f2fe; }
        .grid-item.facebook:hover { color: #1877f2; box-shadow: 0 0 20px #1877f2; border-color: #1877f2; }
        .grid-item.zalo:hover { color: #0068ff; box-shadow: 0 0 20px #0068ff; border-color: #0068ff; }
        .grid-item.telegram:hover { color: #229ed9; box-shadow: 0 0 20px #229ed9; border-color: #229ed9; }
        .grid-item.instagram:hover { color: #e4405f; box-shadow: 0 0 20px #e4405f; border-color: #e4405f; }
        .grid-item.tinder:hover { color: #ff296a; box-shadow: 0 0 20px #ff296a; border-color: #ff296a; }
        .grid-item.gamepad:hover { color: #7c5cff; box-shadow: 0 0 20px #7c5cff; border-color: #7c5cff; }

    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="main-wrapper">
        <div class="container">
            <h1 class="title">Kết Nối</h1>
            <div class="grid">
                <div class="grid-item tiktok"><i class="fa-brands fa-tiktok"></i></div>
                <div class="grid-item facebook"><i class="fa-brands fa-facebook"></i></div>
                <div class="grid-item zalo"><i class="fa-solid fa-comments"></i></div>
                <div class="grid-item telegram"><i class="fa-brands fa-telegram"></i></div>
                <div class="grid-item instagram"><i class="fa-brands fa-instagram"></i></div>
                <div class="grid-item tinder"><i class="fa-brands fa-tinder"></i></div>
                <div class="grid-item gamepad"><i class="fa-solid fa-gamepad"></i></div>
                <div class="grid-item gamepad"><i class="fa-solid fa-gamepad"></i></div>
            </div>
        </div>
    </div>

    <script>
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            cursorOutline.style.left = `${posX}px`;
            cursorOutline.style.top = `${posY}px`;
        });

        document.querySelectorAll('.grid-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursorOutline.classList.add('cursor-hover');
            });
            item.addEventListener('mouseleave', () => {
                cursorOutline.classList.remove('cursor-hover');
            });
        });

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            document.body.appendChild(star);

            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            star.style.left = `${Math.random() * window.innerWidth}px`;
            
            const duration = Math.random() * 4000 + 3000;
            star.style.animationDuration = `${duration}ms`;

            setTimeout(() => {
                star.remove();
            }, duration);
        }

        setInterval(createStar, 300);
    </script>
</body>
</html>
